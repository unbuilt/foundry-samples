# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: local-tools
displayName: "Local Tools Agent"

description: >
  A travel assistant agent with local C# function tools for hotel search in Seattle.

metadata:
  tags:
    - AI Agent Hosting
    - Azure AI AgentServer
    - Responses Protocol
    - Agent Framework
    - Local Tools

template:
  name: local-tools
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  resources:
    cpu: "0.25"
    memory: 0.5Gi
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
