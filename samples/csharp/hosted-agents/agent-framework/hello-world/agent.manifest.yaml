# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: hello-world-dotnet-agent-framework
displayName: "Hello World (.NET, Agent Framework)"
description: >
  Minimal Hello World agent using the Responses protocol with the Agent
  Framework approach in C#. Uses Microsoft.Agents.AI to create an AIAgent backed
  by a Foundry model, hosted via AgentHost.CreateBuilder() for automatic port,
  health, and telemetry configuration.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Agent Framework
    - .NET
template:
  name: hello-world-dotnet-agent-framework
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
