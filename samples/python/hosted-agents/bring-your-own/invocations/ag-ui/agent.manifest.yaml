# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: ag-ui-invocations
displayName: "AG-UI (Invocations)"
description: >
  AG-UI protocol over Foundry invocations using Pydantic AI with Azure OpenAI.
  Streams standard AG-UI events (RUN_STARTED, TEXT_MESSAGE_CONTENT,
  RUN_FINISHED, etc.) with zero manual event translation.
metadata:
  tags:
    - AI Agent Hosting
    - AG-UI Protocol
    - Pydantic AI
    - Invocations Protocol
    - Bring Your Own
template:
  name: ag-ui-invocations
  kind: hosted
  protocols:
    - protocol: invocations
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
