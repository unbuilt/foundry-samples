# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: background-agent-responses
displayName: "Background Agent (Responses)"
description: >
  A long-running agent that demonstrates the background execution pattern using
  the azure-ai-agentserver-responses SDK. Processes requests asynchronously via
  background=true, streaming LLM tokens as they arrive. Supports polling and
  cancellation.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Bring Your Own
    - Background Mode
    - Python
template:
  name: background-agent-responses
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING
    # are injected by the platform (hosted) and translated by azd (local)
    # — do NOT declare them here.
    #
    # Model deployment name — resolved from the resources section below.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
