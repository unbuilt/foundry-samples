kind: hosted
name: toolbox-langgraph
description: LangGraph agent wired for toolbox MCP in Microsoft Foundry.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "0.25"
  memory: 0.5Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME}
  - name: TOOLBOX_NAME
    value: ${TOOLBOX_NAME}
