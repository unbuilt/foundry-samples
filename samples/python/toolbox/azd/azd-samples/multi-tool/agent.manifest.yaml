# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: toolbox-azd-multi-tool
displayName: "LangGraph Multi-Tool Toolbox Agent (Web Search + GitHub MCP)"
description: >
  LangGraph ReAct agent with a combined toolbox: Bing web search plus GitHub
  MCP tools via key-based auth. Demonstrates multiple tool types in one toolbox.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - MCP
    - Web Search
    - GitHub
    - Microsoft Foundry
template:
  name: toolbox-azd
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: ${TOOLBOX_NAME=agent-tools}
  resources:
    cpu: "0.25"
    memory: 0.5Gi
parameters:
  properties:
    - name: github_pat
      secret: true
      description: GitHub Personal Access Token (classic ghp_... or fine-grained github_pat_...)
resources:
  - kind: model
    id: gpt-4o
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: connection
    name: github-mcp-conn
    category: RemoteTool
    authType: CustomKeys
    target: https://api.githubcopilot.com/mcp
    credentials:
      type: CustomKeys
      keys:
        Authorization: "Bearer {{ github_pat }}"
  - kind: toolbox
    name: agent-tools
    tools:
      - type: web_search
      - type: mcp
        server_label: github
        project_connection_id: github-mcp-conn
