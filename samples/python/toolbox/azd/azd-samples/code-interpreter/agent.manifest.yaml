# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: toolbox-azd-code-interpreter
displayName: "LangGraph Code Interpreter Toolbox Agent"
description: >
  LangGraph ReAct agent with a Code Interpreter toolbox. Executes Python
  code in a sandboxed environment via toolbox in Microsoft Foundry.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Code Interpreter
    - Microsoft Foundry
template:
  name: toolbox-azd
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: ${TOOLBOX_NAME=agent-tools}
  resources:
    cpu: "0.25"
    memory: 0.5Gi
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-4o
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: toolbox
    name: agent-tools
    tools:
      - type: code_interpreter
