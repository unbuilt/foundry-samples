# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: toolbox-azd-web-search
displayName: "LangGraph Web Search Toolbox Agent"
description: >
  LangGraph ReAct agent with a Bing web search toolbox. The simplest toolbox
  scenario — no connections or secrets required.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Web Search
    - Microsoft Foundry
template:
  name: toolbox-azd
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: ${TOOLBOX_NAME=agent-tools}
  resources:
    cpu: "0.25"
    memory: 0.5Gi
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-4o
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: toolbox
    name: agent-tools
    tools:
      - type: web_search
