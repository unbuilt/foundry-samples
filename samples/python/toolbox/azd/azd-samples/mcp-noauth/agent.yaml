# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
# This file lives in src/<agent>/agent.yaml inside the deployed container.
# It is the RUNTIME definition only  no parameters or resources.
# The init-time configuration (connections, toolboxes, parameters to prompt) lives in agent.manifest.yaml.
kind: hosted
name: toolbox-azd
description: LangGraph ReAct agent wired to an toolbox in Microsoft Foundry via MCP.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
protocols:
  - protocol: responses
    version: 1.0.0
environment_variables:
  # FOUNDRY_PROJECT_ENDPOINT and FOUNDRY_AGENT_TOOLBOX_* are injected
  # automatically by the platform at runtime  do NOT declare them here.
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: ${AZURE_AI_MODEL_DEPLOYMENT_NAME=gpt-4o}
  - name: TOOLBOX_NAME
    value: ${TOOLBOX_NAME=agent-tools}