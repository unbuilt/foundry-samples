# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: toolbox-azd-ai-search
displayName: "LangGraph Azure AI Search Toolbox Agent"
description: >
  LangGraph ReAct agent with an Azure AI Search toolbox. Queries an existing
  search index via toolbox proxy in Microsoft Foundry.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Azure AI Search
    - Microsoft Foundry
template:
  name: toolbox-azd
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_NAME
      value: ${TOOLBOX_NAME=agent-tools}
  resources:
    cpu: "0.25"
    memory: 0.5Gi
parameters:
  properties:
    - name: ai_search_endpoint
      secret: false
      description: Azure AI Search service endpoint (e.g. https://my-search.search.windows.net/)
    - name: ai_search_key
      secret: true
      description: Azure AI Search admin key
    - name: ai_search_index_name
      secret: false
      description: Name of the search index to query
resources:
  - kind: model
    id: gpt-4o
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
  - kind: connection
    name: aisearch-conn
    category: CognitiveSearch
    authType: ApiKey
    target: "{{ ai_search_endpoint }}"
    credentials:
      type: ApiKey
      key: "{{ ai_search_key }}"
  - kind: toolbox
    name: agent-tools
    tools:
      - type: azure_ai_search
        index_name: "{{ ai_search_index_name }}"
        project_connection_id: aisearch-conn
