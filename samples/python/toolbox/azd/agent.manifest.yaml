name: toolbox-azd
description: >
  LangGraph ReAct agent wired to an toolbox MCP endpoint in Microsoft Foundry.
  Demonstrates end-to-end hosted deployment via azd: toolbox provisioning,
  container build, and agent deployment with platform-injected toolbox credentials.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Toolbox
    - MCP
    - Microsoft Foundry
template:
  name: toolbox-azd
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: MODEL_DEPLOYMENT_NAME
      value: "{{MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_ENDPOINT
      value: "{{TOOLBOX_ENDPOINT}}"
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-4.1-mini
    name: MODEL_DEPLOYMENT_NAME
