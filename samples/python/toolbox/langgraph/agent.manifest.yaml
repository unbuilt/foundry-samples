name: toolbox-langgraph
description: >
  LangGraph ReAct agent wired to an toolbox MCP endpoint in Microsoft Foundry.
  Connects to a hosted toolbox via MCP and exposes its tools through a
  LangGraph ReAct loop with Azure OpenAI.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
    - Toolbox
    - MCP
    - Microsoft Foundry
template:
  name: toolbox-langgraph
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: MODEL_DEPLOYMENT_NAME
      value: "{{MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_ENDPOINT
      value: "{{TOOLBOX_ENDPOINT}}"
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-4.1-mini
    name: MODEL_DEPLOYMENT_NAME
