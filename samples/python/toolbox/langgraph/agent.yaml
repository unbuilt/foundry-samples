name: toolbox-langgraph
description: LangGraph agent wired for toolbox MCP in Microsoft Foundry.
metadata:
  tags:
    - AI Agent Hosting
    - LangGraph
template:
  name: toolbox-langgraph
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT is injected by the platform — do NOT declare it here.
    - name: MODEL_DEPLOYMENT_NAME
      value: ${MODEL_DEPLOYMENT_NAME=gpt-4.1}
    - name: TOOLBOX_ENDPOINT
      value: ${TOOLBOX_ENDPOINT}
resources:
  - kind: model
    id: gpt-4o
    name: chat
