# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: toolbox-maf
displayName: "Microsoft Agent Framework Toolbox Agent"
description: >
  Microsoft Agent Framework (MAF) agent wired to an toolbox in Microsoft Foundry
  MCP endpoint via MCPStreamableHTTPTool. Demonstrates using the Agent Framework
  SDK's native MCP transport support with a hosted toolbox.
metadata:
  tags:
    - AI Agent Hosting
    - Agent Framework
    - Toolbox
    - MCP
    - Microsoft Foundry
template:
  name: toolbox-maf
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: MODEL_DEPLOYMENT_NAME
      value: "{{MODEL_DEPLOYMENT_NAME}}"
    - name: TOOLBOX_ENDPOINT
      value: "{{TOOLBOX_ENDPOINT}}"
parameters:
  properties: []
resources:
  - kind: model
    id: gpt-4.1
    name: MODEL_DEPLOYMENT_NAME
